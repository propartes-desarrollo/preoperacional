services:
  base_de_datos_postgresql:
    image: postgres:16-alpine
    container_name: preoperacional_sst_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - preoperacional_sst_postgres_data:/var/lib/postgresql/data

    networks:
      preoperacional_sst_red_interna:
        aliases:
          - preoperacional_sst_db

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend_node:
    container_name: preoperacional_sst_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    volumes:
      - ./uploads:/app/uploads

    depends_on:
      base_de_datos_postgresql:
        condition: service_healthy

    networks:
      - preoperacional_sst_red_interna

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend_nginx:
    container_name: preoperacional_sst_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped

    depends_on:
      - backend_node

    networks:
      - preoperacional_sst_red_interna
      - proxy_red_compartida

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  preoperacional_sst_red_interna:
    name: preoperacional_sst_red_interna
    driver: bridge
  proxy_red_compartida:
    external: true

volumes:
  preoperacional_sst_postgres_data:
    name: preoperacional_sst_postgres_data
