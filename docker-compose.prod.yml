services:
  base_de_datos_postgresql:
    image: postgres:16-alpine
    container_name: base_de_datos_postgresql
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - preoperacional_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend_node:
    container_name: backend_node
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped

    env_file:
      - .env

    environment:
      NODE_ENV: production

    volumes:
      - uploads_data:/app/uploads

    depends_on:
      base_de_datos_postgresql:
        condition: service_healthy

    networks:
      - preoperacional_network

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend_nginx:
    container_name: frontend_nginx
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production

    env_file:
      - .env

    depends_on:
      - backend_node

    ports:
      - "80:80"

    networks:
      - preoperacional_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  preoperacional_network:
    name: preoperacional_network
    driver: bridge

volumes:
  postgres_data:
    name: postgres_data_preoperacional
  uploads_data:
    name: uploads_data_preoperacional
