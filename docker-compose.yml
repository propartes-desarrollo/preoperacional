services:
  base_de_datos_postgresql:
    image: postgres:16-alpine
    container_name: base_de_datos_postgresql
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

    networks:
      - preoperacional_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend_node:
    container_name: backend_node
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped

    command: npx nodemon src/index.js

    env_file:
      - .env

    environment:
      NODE_ENV: development

    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json

    depends_on:
      base_de_datos_postgresql:
        condition: service_healthy

    ports:
      - "3006:3000"

    networks:
      - preoperacional_network

  frontend_vite:
    container_name: frontend_vite
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development

    env_file:
      - .env

    environment:
      VITE_API_PROXY_TARGET: http://backend_node:3000

    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/public:/app/public

    depends_on:
      - backend_node

    ports:
      - "5176:5173"

    networks:
      - preoperacional_network

    restart: unless-stopped

networks:
  preoperacional_network:
    name: preoperacional_network
    driver: bridge

volumes:
  postgres_data:
    name: postgres_data_preoperacional
